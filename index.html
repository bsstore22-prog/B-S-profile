<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B&S NFC Profile</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="profile-card">
    <div class="top-actions">
      <button id="langBtn">EN</button>
      <button id="modeBtn">🌙</button>
    </div>

    <img id="profileImage" class="profile-image" src="" alt="Profile Image" />

    <h1 id="customerName"></h1>
    <p id="customerJob"></p>

    <div class="buttons">
      <a id="whatsappBtn" class="btn" target="_blank">WhatsApp</a>
      <a id="instapayBtn" class="btn" target="_blank">InstaPay</a>
      <a id="facebookBtn" class="btn" target="_blank">Facebook</a>
      <a id="instagramBtn" class="btn" target="_blank">Instagram</a>
      <a id="tiktokBtn" class="btn" target="_blank">TikTok</a>
      <a id="xBtn" class="btn" target="_blank">X</a>
      <a id="mapsBtn" class="btn" target="_blank">Google Maps</a>
    </div>

    <div class="qr-box">
      <p id="qrTitle">QR Code</p>
      <img id="qrImage" alt="QR Code" />
    </div>

    <footer>Powered by OneTap</footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
