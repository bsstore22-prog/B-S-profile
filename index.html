<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta name="theme-color" content="#ffffff">

  <title>OneTap NFC Profile</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main id="profileCard" class="profile-card">

    <!-- Dark Mode button -->
    <button
      id="darkModeButton"
      class="dark-mode-button"
      type="button"
      aria-label="Toggle dark mode"
    >
      🌙
    </button>

    <!-- Loading message -->
    <div id="loadingMessage" class="loading-message">
      Loading profile...
    </div>

    <!-- Profile content -->
    <section id="profileContent" class="profile-content hidden">

      <img
        id="profileImage"
        class="profile-image"
        src=""
        alt="Customer profile picture"
      >

      <h1 id="customerName"></h1>

      <p id="customerJob" class="customer-job"></p>

      <div class="buttons-container">

        <a
          id="whatsappButton"
          class="profile-button whatsapp-button"
          href="#"
          target="_blank"
          rel="noopener noreferrer"
        >
          WhatsApp
        </a>

        <a
          id="instapayButton"
          class="profile-button instapay-button"
          href="#"
          target="_blank"
          rel="noopener noreferrer"
        >
          InstaPay
        </a>

        <a
          id="facebookButton"
          class="profile-button facebook-button"
          href="#"
          target="_blank"
          rel="noopener noreferrer"
        >
          Facebook
        </a>

        <a
          id="instagramButton"
          class="profile-button instagram-button"
          href="#"
          target="_blank"
          rel="noopener noreferrer"
        >
          Instagram
        </a>

        <a
          id="tiktokButton"
          class="profile-button tiktok-button"
          href="#"
          target="_blank"
          rel="noopener noreferrer"
        >
          TikTok
        </a>

        <a
          id="xButton"
          class="profile-button x-button"
          href="#"
          target="_blank"
          rel="noopener noreferrer"
        >
          X
        </a>

        <a
          id="mapsButton"
          class="profile-button maps-button"
          href="#"
          target="_blank"
          rel="noopener noreferrer"
        >
          Google Maps
        </a>

      </div>

      <footer>
        Powered by <strong>OneTap</strong>
      </footer>

    </section>

    <!-- Error message -->
    <section id="errorMessage" class="error-message hidden">
      <h2>Profile Not Found</h2>
      <p>Please check the customer link.</p>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
